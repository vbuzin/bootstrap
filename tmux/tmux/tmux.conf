# -- general -------------------------------------------------------------------
set -g default-terminal "tmux-256color"

# Ghostty/Neovim TrueColor + undercurl + images
set -as terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # undercurl colors

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g focus-events on
set -sg escape-time 10
set -g history-limit 100000  # QoL: More scrollback
set -g display-panes-time 2000  # Slower pane number display

# -- prefix --------------------------------------------------------------------
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# -- display -------------------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format '#{?pane_in_mode,[tmux],#{?window_zoomed_flag,[Z],#{b:pane_current_path}/#{pane_current_command}}}'

set -g mouse on
setw -g monitor-activity on
set -g visual-activity on  # Activity alerts

# -- navigation & ergonomics ---------------------------------------------------
# Splits (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"  # QoL: Backslash for horiz

# Vim panes
bind h select-pane -L; bind j select-pane -D; bind k select-pane -U; bind l select-pane -R
bind -r H resize-pane -L 5; bind -r J resize-pane -D 5; bind -r K resize-pane -U 5; bind -r L resize-pane -R 5

# Sync panes (great for broadcasting)
bind C-a setw synchronize-panes

# Kill shortcuts
bind-key & confirm-before kill-window
bind-key x kill-pane

# Reload (tmux expands ~)
bind R source-file "~/.config/tmux/tmux.conf" \; display-message "Reloaded!"

# -- copy-mode vi (improved mouse/clipboard) ------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"  # Mouse drag → clipboard
set -s set-clipboard on  # OSC52 for SSH

# -- status bar (One Dark Pro Max theme) ----------------------------------------
# Layout (updates every 5s via status-interval):
# LEFT: Session name (magenta on subtle bg) + [RO] if readonly pane.
# CENTER: Windows as #I:#W with badges:
#   [!] = activity in window (visual-activity on).
#   [Z] = window zoomed.
#   [tmux] = if pane in copy-mode.
# RIGHT: CPU % (top process cpu), RAM free GB (vm_stat pages*4KB/1GB), [BELL] if recent bell.
# COLORS: Ghostty One Dark palette-matched. Subtle bgs barely above #080909.
#         Active window blue pop; inactive/segments ultra-subtle #0f1419.
set -g status-position bottom
set -g status-interval 5  # Less CPU
set -g status-left-length 40
set -g status-right-length 80

# Colors from your Ghostty config
one_dark_bg="#080909"
one_dark_fg="#abb2bf"
one_dark_subtle="#0f1419"  # Ultra-subtle: slight lift from bg
one_dark_blue="#4aa5f0"
one_dark_magenta="#c162de"
one_dark_yellow="#f0a45d"

set -g status-style "bg=${one_dark_bg},fg=${one_dark_fg}"

# Left: Session w/ subtle bg, magenta fg
set -g status-left "#[fg=${one_dark_magenta},bg=${one_dark_subtle},bold][ #S ]#[fg=${one_dark_fg},bg=${one_dark_bg}]#{?client_readonly,[RO],} "

# Windows: Inactive ultra-subtle bg
set -g window-status-current-format "#[fg=${one_dark_bg},bg=${one_dark_blue},bold] #I:#W#{?window_zoomed_flag,[Z],}#{?window_activity_flag,[!],} #[fg=${one_dark_fg},bg=${one_dark_bg}]"
set -g window-status-format "#[fg=${one_dark_fg},bg=${one_dark_subtle}] #I:#W#{?window_zoomed_flag,[Z],}#{?window_activity_flag,[!],} #[fg=${one_dark_fg},bg=${one_dark_bg}]"

# Right: CPU yellow pop, RAM subtle bg
set -g status-right "#[fg=${one_dark_bg},bg=${one_dark_yellow}] CPU:#(top -l 1 | awk '/CPU usage/ {print int(\$3+0.5)\"%%\"}') #[fg=${one_dark_fg},bg=${one_dark_subtle}] RAM:#(vm_stat | awk '/Pages free/ {print int(\$3/65536) \"G\"}') #[fg=${one_dark_fg},bg=${one_dark_bg}]#{?window_bell_flag,[BELL],} "
