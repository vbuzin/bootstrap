# One Dark Pro Max theme for Lazygit
# Adopted/adapted from https://github.com/bukitoka/one-dark-pro-max (Zed theme)
# Colors chosen for consistency with:
#   - Ghostty terminal palette
#   - Helix one-dark-pro-max.toml
#   - Starship one_dark_pro_max palette
#   - Neovim onedarkpro.nvim overrides + lualine
#
# This provides a cohesive One Dark Pro Max experience across the terminal.

gui:
  theme:
    # Border color of focused window
    activeBorderColor:
      - "#61afef"
      - bold

    # Border color of non-focused windows
    inactiveBorderColor:
      - "#495162"

    # Border color of focused window when searching in that window
    searchingActiveBorderColor:
      - "#d19a66"
      - bold

    # Color of keybindings help text in the bottom line
    optionsTextColor:
      - "#61afef"

    # Background color of selected line (very subtle lift, just slightly brighter than bg)
    selectedLineBgColor:
      - "#0f1419"

    # Background color of selected line when view doesn't have focus.
    # Use the same subtle or default; here we keep a very faint lift for context.
    inactiveViewSelectedLineBgColor:
      - "#0f1419"

    # Foreground color of copied commit
    cherryPickedCommitFgColor:
      - "#61afef"

    # Background color of copied commit
    cherryPickedCommitBgColor:
      - "#495162"

    # Foreground color of marked base commit (for rebase)
    markedBaseCommitFgColor:
      - "#61afef"

    # Background color of marked base commit (for rebase)
    markedBaseCommitBgColor:
      - "#e5c07b"

    # Color for file with unstaged changes
    unstagedChangesColor:
      - "#e05561"

    # Default text color
    defaultFgColor:
      - "#abb2bf"


  border: single

  # Nerd Fonts (we install Monaspace NF via Brewfile/cask)
  nerdFontsVersion: "3"
  showIcons: true

  # Prefer tree view for files (matches common modern git UIs)
  showFileTree: true
